<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 16px;
            padding-bottom: 60px; /* 为底部固定按钮留出空间 */
        }
        #site-info {
            padding: 8px;
            margin-bottom: 16px;
            background-color: #f0f0f0;
            border-radius: 4px;
            font-size: 14px;
        }
        
        /* 一键操作按钮样式 */
        #toggle-all-container {
            position: fixed;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            text-align: center;
        }
        
        #toggle-all-btn {
            background: #1a73e8;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(26, 115, 232, 0.3);
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        
        #toggle-all-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(26, 115, 232, 0.4);
        }
        
        #toggle-all-btn:active {
            transform: translateY(0);
        }
        
        #toggle-all-btn .icon {
            font-size: 14px;
            transition: transform 0.3s ease;
        }
        
        #toggle-all-btn.collapsed .icon {
            transform: rotate(-90deg);
        }
        
        .outline-item {
            cursor: pointer;
            padding: 4px 8px;
            margin: 2px 0;
            border-radius: 4px;
            transition: all 0.3s ease;
        }
        .outline-item:hover {
            background-color: #f0f0f0;
        }
        .outline-item.question {
            border-left: 3px solid #1a73e8;
            display: flex;
            align-items: center;
        }
        .outline-item.answer {
            border-left: 3px solid #34a853;
        }
        .toggle-icon {
            font-size: 12px;
            color: #666;
            display: inline-block;
            width: 15px;
            text-align: center;
            transition: transform 0.3s ease;
        }
        .answers-container {
            transition: all 0.3s ease;
            overflow: hidden;
        }
        /* 层级缩进 */
        .h1 { margin-left: 0; }
        .h2 { margin-left: 20px; }
        .h3 { margin-left: 40px; }
        .h4 { margin-left: 60px; }
        .h5 { margin-left: 80px; }
        .h6 { margin-left: 100px; }
        
        /* 当前阅读位置高亮样式 */
        .current-reading {
            background-color: #e3f2fd !important;
            border-left-color: #2196f3 !important;
            font-weight: bold;
            box-shadow: 0 2px 8px rgba(33, 150, 243, 0.3);
            transform: translateX(4px);
            position: relative;
        }
        
        .current-reading::before {
            content: '';
            position: absolute;
            left: -8px;
            top: 50%;
            transform: translateY(-50%);
            width: 4px;
            height: 4px;
            background-color: #2196f3;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(33, 150, 243, 0.7);
            }
            70% {
                box-shadow: 0 0 0 10px rgba(33, 150, 243, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(33, 150, 243, 0);
            }
        }
        
        /* 阅读进度指示器 */
        #reading-progress {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, #2196f3, #4caf50);
            transition: width 0.3s ease;
            z-index: 1000;
            border-radius: 0 2px 2px 0;
        }
        
        /* 平滑滚动 */
        .outline-item {
            scroll-behavior: smooth;
        }
        
        /* 响应式设计 */
        @media (max-width: 300px) {
            .h2 { margin-left: 15px; }
            .h3 { margin-left: 30px; }
            .h4 { margin-left: 45px; }
            .h5 { margin-left: 60px; }
            .h6 { margin-left: 75px; }
        }
    </style>
</head>
<body>
    <div id="site-info"></div>
    <div id="outline"></div>
    <div id="toggle-all-container">
        <button id="toggle-all-btn">
            <span class="icon">▼</span>
            <span class="text">收起所有</span>
        </button>
    </div>
    <script src="sidepanel.js"></script>
</body>
</html>
